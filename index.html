  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
    }
    .container { max-width: 1280px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 25px; }
    header h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; }
    header p { color: var(--text-light); font-size: 0.95rem; }
    .controls {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-weight: 500; font-size: 0.9rem; color: var(--text); }
    .input-group input, .input-group select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .btn-group { display: flex; gap: 10px; align-items: flex-end; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-search { background: var(--primary); color: white; }
    .btn-search:hover { background: var(--primary-hover); }
    .btn-clear { background: var(--border); color: var(--text); }
    .btn-clear:hover { background: #cbd5e1; }
    .table-wrapper {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 850px; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    th { background: #f1f5f9; font-weight: 600; color: var(--text); position: sticky; top: 0; }
    tr:hover { background: #f8fafc; }
    .no-data { text-align: center; color: var(--text-light); padding: 30px !important; font-style: italic; }
    .dept-tag {
      display: inline-block;
      background: #e0e7ff;
      color: #3730a3;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin: 2px;
    }
    footer { text-align: center; margin-top: 30px; color: var(--text-light); font-size: 0.85rem; }
    @media (max-width: 768px) {
      .controls { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
      th, td { padding: 10px; font-size: 0.9rem; }
    }
  </style>
</head>

    // 🔍 ড্রপডাউন পপুলেট করা
    function populateDropdowns() {
      const semSelect = document.getElementById('semesterFilter');
      const deptSelect = document.getElementById('deptFilter');
      
      const semesters = [...new Set(routineData.map(i => i.semester))].sort();
      const departments = [...new Set(routineData.flatMap(i => i.departments))].sort();

      semesters.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        semSelect.appendChild(opt);
      });

      departments.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        deptSelect.appendChild(opt);
      });
    }

    // 📋 টেবিল রেন্ডার করা
    function renderTable(data) {
      const tbody = document.getElementById('routineBody');
      tbody.innerHTML = '';
      
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="no-data">❌ কোনো রুটিন পাওয়া যায়নি। অনুগ্রহ করে ফিল্টার পরিবর্তন করুন।</td></tr>';
        return;
      }

      data.forEach(item => {
        const row = document.createElement('tr');
        const deptHTML = item.departments.map(d => `<span class="dept-tag">${d}</span>`).join('');
        row.innerHTML = `
          <td>${item.date}</td>
          <td>${item.day}</td>
          <td>${item.time}</td>
          <td>${item.semester}</td>
          <td><strong>${item.code}</strong></td>
          <td>${item.name}</td>
          <td>${deptHTML}</td>
        `;
        tbody.appendChild(row);
      });
    }

    // 🔎 ফিল্টার লজিক
    function filterRoutine() {
      const nameQuery = document.getElementById('nameSearch').value.trim().toLowerCase();
      const codeQuery = document.getElementById('codeSearch').value.trim();
      const semFilter = document.getElementById('semesterFilter').value;
      const deptFilter = document.getElementById('deptFilter').value;

      const filtered = routineData.filter(item => {
        const matchName = !nameQuery || item.name.toLowerCase().includes(nameQuery);
        const matchCode = !codeQuery || item.code.includes(codeQuery);
        const matchSem = !semFilter || item.semester === semFilter;
        const matchDept = !deptFilter || 
                          item.departments.includes(deptFilter) || 
                          item.departments.some(d => d.includes('সকল টেকনোলজি'));
        return matchName && matchCode && matchSem && matchDept;
      });

      renderTable(filtered);
    }

    // 🔄 ইভেন্ট লিসেনার
    document.getElementById('nameSearch').addEventListener('input', filterRoutine);
    document.getElementById('codeSearch').addEventListener('input', filterRoutine);
    document.getElementById('semesterFilter').addEventListener('change', filterRoutine);
    document.getElementById('deptFilter').addEventListener('change', filterRoutine);
    
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('nameSearch').value = '';
      document.getElementById('codeSearch').value = '';
      document.getElementById('semesterFilter').value = '';
      document.getElementById('deptFilter').value = '';
      renderTable(routineData);
    });

    // 🚀 ইনিশিয়ালাইজ
    window.addEventListener('DOMContentLoaded', () => {
      populateDropdowns();
      renderTable(routineData);
    });
  </script>
