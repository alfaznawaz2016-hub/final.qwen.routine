  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
    }
    .container { max-width: 1280px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 25px; }
    header h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; }
    header p { color: var(--text-light); font-size: 0.95rem; }
    .controls {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-weight: 500; font-size: 0.9rem; color: var(--text); }
    .input-group input, .input-group select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .btn-group { display: flex; gap: 10px; align-items: flex-end; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear { background: var(--border); color: var(--text); width: 100%; height: 42px;}
    .btn-clear:hover { background: #cbd5e1; }
    .table-wrapper {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      overflow-x: auto;
      max-height: 70vh;
    }
    table { width: 100%; border-collapse: collapse; min-width: 850px; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    th { background: #f1f5f9; font-weight: 600; color: var(--text); position: sticky; top: 0; z-index: 10; }
    tr:hover { background: #f8fafc; }
    .no-data { text-align: center; color: var(--text-light); padding: 30px !important; font-style: italic; }
    .dept-tag {
      display: inline-block;
      background: #e0e7ff;
      color: #3730a3;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin: 2px;
    }
    footer { text-align: center; margin-top: 30px; color: var(--text-light); font-size: 0.85rem; }
    @media (max-width: 768px) {
      .controls { grid-template-columns: 1fr; }
      header h1 { font-size: 1.5rem; }
      th, td { padding: 10px; font-size: 0.9rem; }
    }
  </style>
</head>

    ];

    const routineBody = document.getElementById('routineBody');
    const nameSearch = document.getElementById('nameSearch');
    const codeSearch = document.getElementById('codeSearch');
    const semesterFilter = document.getElementById('semesterFilter');
    const deptFilter = document.getElementById('deptFilter');
    const clearBtn = document.getElementById('clearBtn');

    // ড্রপডাউন পপুলেশন (ডেটা থেকে স্বয়ংক্রিয়ভাবে)
    function initFilters() {
      // Unique Semesters
      const semesters = [...new Set(routineData.map(item => item.semester))].sort();
      semesters.forEach(s => {
        semesterFilter.innerHTML += `<option value="${s}">${s}</option>`;
      });

      // Unique Departments
      const depts = [...new Set(routineData.flatMap(item => item.departments))].sort();
      depts.forEach(d => {
        deptFilter.innerHTML += `<option value="${d}">${d}</option>`;
      });
    }

    // টেবিল রেন্ডারিং ও ফিল্টারিং লজিক
    function render() {
      const filtered = routineData.filter(item => {
        const matchName = item.name.toLowerCase().includes(nameSearch.value.toLowerCase());
        const matchCode = item.code.includes(codeSearch.value);
        const matchSemester = semesterFilter.value === "" || item.semester === semesterFilter.value;
        const matchDept = deptFilter.value === "" || item.departments.includes(deptFilter.value);
        
        return matchName && matchCode && matchSemester && matchDept;
      });

      if(filtered.length === 0) {
        routineBody.innerHTML = `<tr><td colspan="7" class="no-data">কোনো রুটিন পাওয়া যায়নি</td></tr>`;
        return;
      }

      routineBody.innerHTML = filtered.map(row => `
        <tr>
          <td>${row.date}</td>
          <td>${row.day}</td>
          <td>${row.time}</td>
          <td>${row.semester}</td>
          <td>${row.code}</td>
          <td>${row.name}</td>
          <td>${row.departments.map(d => `<span class="dept-tag">${d}</span>`).join('')}</td>
        </tr>
      `).join('');
    }

    // ফিল্টার মুছে ফেলা
    clearBtn.addEventListener('click', () => {
      nameSearch.value = '';
      codeSearch.value = '';
      semesterFilter.value = '';
      deptFilter.value = '';
      render();
    });

    // ইভেন্ট লিসেনার যুক্ত করা
    [nameSearch, codeSearch, semesterFilter, deptFilter].forEach(el => {
      el.addEventListener('input', render);
    });
    
    // অ্যাপ চালু করা
    initFilters();
    render();
  </script>
</body>
</html>
