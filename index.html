            margin: 0 auto;

            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);

            padding-bottom: 16px;

        }

            color: var(--primary);

        .controls {

            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }

        .control-group label {

            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text);
        }

        input[type="text"], select {

            padding: 10px 12px;

            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;

            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,204,0.15);
        }

        .table-container {

            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 800px;
        }

        thead {
            background: var(--primary);
            color: white;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #e0f2fe;
            color: #0369a1;
            margin-right: 6px;

            color: var(--text-light);

        { code: "28571", name: "ডিজিটাল মার্কেন্টিং টেকনিক", semester: "৭ম", date: "09-08-2026", day: "রবিবার", time: "সকাল 10:00", depts: ["কম্পিউটার সায়েন্স"] },
        { code: "28841", name: "কন্সট্রাকশন কিমোলজি-২", semester: "৪র্থ", date: "08-08-2026", day: "শনিবার", time: "বিকাল 2:00", depts: ["কন্সট্রাকশন"] },
        { code: "29051", name: "ওয়াটার অ্যান্ড ওয়েস্ট ওয়াটার ইঞ্জিনিয়ারিং", semester: "৫ম", date: "16-08-2026", day: "রবিবার", time: "বিকাল 2:00", depts: ["এনভায়রনমেন্টাল"] },
        { code: "25721", name: "বাংলা-২", semester: "সকল", date: "17-08-2026", day: "সোমবার", time: "সকাল 10:00", depts: ["সকল টেকনোলজি"] }
    ];

    // 🔹 DOM Elements
    const searchInput = document.getElementById('searchInput');
    const semesterFilter = document.getElementById('semesterFilter');
    const deptFilter = document.getElementById('deptFilter');
    const tableBody = document.getElementById('tableBody');
    const noResult = document.getElementById('noResult');
    const stats = document.getElementById('stats');

    // 🔹 ফিল্টার অপশন পপুলেট করা
    function populateFilters() {
        const semesters = new Set();
        const departments = new Set();

        routineData.forEach(item => {
            if (item.semester !== 'সকল') semesters.add(item.semester);
            item.depts.forEach(dept => {
                if (dept !== 'সকল টেকনোলজি') departments.add(dept);
            });
        });

        // সেমিস্টার সর্ট করা
        const semOrder = ["১ম", "২য়", "৩য়", "৪র্থ", "৫ম", "৬ষ্ঠ", "৭ম", "৮ম"];
        [...semesters].sort((a, b) => semOrder.indexOf(a) - semOrder.indexOf(b)).forEach(sem => {
            const opt = document.createElement('option');
            opt.value = sem;
            opt.textContent = sem + ' পর্ব';
            semesterFilter.appendChild(opt);
        });

        // ডিপার্টমেন্ট সর্ট করে যোগ করা
        [...departments].sort((a, b) => a.localeCompare(b, 'bn')).forEach(dept => {
            const opt = document.createElement('option');
            opt.value = dept;
            opt.textContent = dept;
            deptFilter.appendChild(opt);
        });
    }

    // 🔹 টেবিল রেন্ডার ও ফিল্টার লজিক
    function filterAndRender() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        const selectedSem = semesterFilter.value;
        const selectedDept = deptFilter.value;

        const filteredData = routineData.filter(item => {
            const matchesSearch = !searchTerm || 
                                  item.name.toLowerCase().includes(searchTerm) || 
                                  item.code.includes(searchTerm);
            const matchesSem = !selectedSem || item.semester === selectedSem;
            const matchesDept = !selectedDept || item.depts.includes(selectedDept);

            return matchesSearch && matchesSem && matchesDept;
        });

        tableBody.innerHTML = '';
        
        if (filteredData.length === 0) {
            noResult.style.display = 'block';
            stats.textContent = '';
            return;
        }

        noResult.style.display = 'none';
        stats.textContent = `মোট ${filteredData.length} টি ফলাফল পাওয়া গেছে`;

        filteredData.forEach(item => {
            const row = document.createElement('tr');
            
            const deptBadges = item.depts.map(d => `<span class="badge">${d}</span>`).join('');
            
            row.innerHTML = `
                <td>${item.date}<br><small style="color:var(--text-light)">${item.day}</small></td>
                <td><strong>${item.time}</strong></td>
                <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">${item.code}</code></td>
                <td><strong>${item.name}</strong></td>
                <td>${item.semester}</td>
                <td>${deptBadges}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 🔹 ইভেন্ট লিসেনার
    searchInput.addEventListener('input', filterAndRender);
    semesterFilter.addEventListener('change', filterAndRender);
    deptFilter.addEventListener('change', filterAndRender);

    // 🔹 প্রাথমিক লোড
    populateFilters();
    filterAndRender();
</script>

</body>
</html>
